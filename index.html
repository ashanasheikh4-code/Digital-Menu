<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Urban</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<header class="hero">

    <img src="hero.png" alt="Cafe Urban">

    <div class="overlay">
        <button onclick="scrollMenu()">Browse Menu</button>
    </div>

</header>

<section id="menu">

    <div class="category">
        <img src="coffee.png" alt="Coffee Menu">
    </div>

    <div class="category">
        <img src="pizza.png" alt="Pizza Menu">
    </div>

    <div class="category">
        <img src="pasta.png" alt="Pasta Menu">
    </div>

    <div class="category">
        <img src="desserts.png" alt="Desserts Menu">
    </div>

    <div class="category">
        <img src="beverages.png" alt="Beverages Menu">
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
